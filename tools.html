<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無料ツール集｜Fit Project AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080A;--card:#0F0F14;--card2:#14141A;--border:#1E1E28;--border2:#252530;
  --text:#F0EDF5;--text2:#C0BCCC;--muted:#5A566A;
  --mono:'Space Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  --t1:#FF3B5C;--t2:#8B5CF6;--t3:#06B6D4;--t4:#F97316;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}

/* TOP BAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);
  position:fixed;top:0;left:0;right:0;z-index:100;height:52px;
}
.topbar-brand{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
.topbar-lp{
  display:flex;align-items:center;gap:5px;
  padding:6px 14px;background:transparent;
  border:1px solid var(--border2);border-radius:8px;
  color:var(--text2);font-family:var(--sans);font-size:11px;font-weight:500;
  cursor:pointer;text-decoration:none;transition:all .2s;
}
.topbar-lp:hover{border-color:var(--accent2,#aaa);color:var(--text)}
.topbar-lp svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* TAB BAR */
.tabbar{
  display:flex;gap:0;
  position:fixed;top:52px;left:0;right:0;z-index:100;
  background:var(--card);border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{display:none}
.tab{
  flex:1;min-width:80px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 8px 8px;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .2s;color:var(--muted);
  font-size:10px;font-weight:500;line-height:1.4;
  white-space:nowrap;gap:4px;
}
.tab-icon{font-size:16px;line-height:1}
.tab.t1{--tc:var(--t1)}
.tab.t2{--tc:var(--t2)}
.tab.t3{--tc:var(--t3)}
.tab.t4{--tc:var(--t4)}
.tab.active{color:var(--tc);border-bottom-color:var(--tc)}

/* IFRAME CONTAINER */
.frames{
  position:fixed;top:100px;left:0;right:0;bottom:0;
}
.frame-wrap{
  position:absolute;inset:0;
  display:none;
}
.frame-wrap.active{display:block}
.frame-wrap iframe{
  width:100%;height:100%;border:none;
  background:var(--bg);
}

/* LOADING OVERLAY */
.loading{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);z-index:10;
  flex-direction:column;gap:14px;
  transition:opacity .3s;
}
.loading.hidden{opacity:0;pointer-events:none}
.spin{
  width:32px;height:32px;border-radius:50%;
  border:2px solid var(--border2);
  border-top-color:var(--tc,#aaa);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">Fit Project AI</div>
  <a class="topbar-lp" href="https://fitprojectai.vercel.app/lp.html" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    詳しく見る
  </a>
</div>

<div class="tabbar">
  <div class="tab t1 active" onclick="switchTab(0)" id="tab0">
    <span class="tab-icon">🥩</span>
    プロテイン
  </div>
  <div class="tab t2" onclick="switchTab(1)" id="tab1">
    <span class="tab-icon">🧠</span>
    原因診断
  </div>
  <div class="tab t3" onclick="switchTab(2)" id="tab2">
    <span class="tab-icon">🕐</span>
    食事タイミング
  </div>
  <div class="tab t4" onclick="switchTab(3)" id="tab3">
    <span class="tab-icon">💪</span>
    トレーニング
  </div>
</div>

<div class="frames">
  <div class="frame-wrap active" id="frame0">
    <div class="loading" id="loading0" style="--tc:var(--t1)">
      <div class="spin"></div>
      <p>Loading...</p>
    </div>
    <iframe src="tool1_protein.html" onload="onLoad(0)"></iframe>
  </div>
  <div class="frame-wrap" id="frame1">
    <div class="loading" id="loading1" style="--tc:var(--t2)">
      <div class="spin"></div>
      <p>Loading...</p>
    </div>
    <iframe id="iframe1" onload="onLoad(1)"></iframe>
  </div>
  <div class="frame-wrap" id="frame2">
    <div class="loading" id="loading2" style="--tc:var(--t3)">
      <div class="spin"></div>
      <p>Loading...</p>
    </div>
    <iframe id="iframe2" onload="onLoad(2)"></iframe>
  </div>
  <div class="frame-wrap" id="frame3">
    <div class="loading" id="loading3" style="--tc:var(--t4)">
      <div class="spin"></div>
      <p>Loading...</p>
    </div>
    <iframe id="iframe3" onload="onLoad(3)"></iframe>
  </div>
</div>

<script>
const srcs=['tool1_protein.html','tool2_diagnosis.html','tool3_timing.html','tool4_training.html'];
const loaded=[false,false,false,false];
let cur=0;

function switchTab(i){
  // tabs
  document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  // frames
  document.querySelectorAll('.frame-wrap').forEach((f,idx)=>f.classList.toggle('active',idx===i));
  // lazy load iframe on first visit
  if(!loaded[i]&&i>0){
    const iframe=document.getElementById('iframe'+i);
    if(iframe&&!iframe.src){iframe.src=srcs[i]}
  }
  cur=i;
}

function onLoad(i){
  const l=document.getElementById('loading'+i);
  if(l){l.classList.add('hidden');setTimeout(()=>l.remove(),350)}
  loaded[i]=true;
}

// listen for back button message from child iframes
window.addEventListener('message',function(e){
  if(e.data==='closeToolOverlay'){/* already at top level — do nothing */}
});
</script>
</body>
</html>
