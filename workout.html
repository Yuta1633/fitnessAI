<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トレーニング記録 | Fit Project AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #050507;
      --dark: #0c0c10;
      --card-bg: #12121a;
      --accent: #c8f135;
      --white: #eeeee8;
      --muted: #8a8a96;
      --red: #ff4d6a;
      --border: #1e1e2a;
      --radius-lg: 20px;
      --radius-md: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ヘッダー */
    .header {
      background: var(--black);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .header a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

    /* ローディング */
    .page-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: var(--muted);
      font-size: 14px;
      gap: 10px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 今週のボリューム */
    .volume-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }
    .volume-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
    }
    .volume-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .volume-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: var(--accent);
      line-height: 1;
    }
    .volume-unit { font-size: 14px; color: var(--muted); margin-left: 4px; vertical-align: bottom; }
    .volume-vs {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      line-height: 1.6;
    }
    .vs-up { color: var(--accent); font-weight: 700; }
    .vs-down { color: var(--red); font-weight: 700; }

    /* 記録フォーム */
    .form-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }
    .form-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--white);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field.full { grid-column: 1 / -1; }
    .form-field label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 700;
    }
    .form-field input {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: var(--radius-md);
      color: var(--white);
      font-size: 15px;
      padding: 11px 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      -webkit-appearance: none;
    }
    .form-field input:focus { border-color: var(--accent); }
    .form-field input::placeholder { color: #3a3a4a; }

    .btn-add {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: var(--black);
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-family: 'Noto Sans JP', sans-serif;
      letter-spacing: 0.5px;
    }
    .btn-add:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-add:active:not(:disabled) { transform: scale(0.98); opacity: 0.85; }

    /* 記録リスト */
    .logs-header {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      padding-left: 2px;
    }
    .date-group { margin-bottom: 20px; }
    .date-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      padding-left: 4px;
      font-weight: 700;
    }
    .log-item {
      background: var(--card-bg);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .log-item:hover { border-color: #2a2a3a; }
    .log-info { flex: 1; min-width: 0; }
    .log-exercise {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-detail { font-size: 12px; color: var(--muted); }
    .log-right {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .log-volume { text-align: right; }
    .log-vol-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--accent);
      line-height: 1;
    }
    .log-vol-unit { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .btn-delete {
      background: none;
      border: none;
      color: #3a3a4a;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      margin-left: 4px;
      transition: color 0.2s;
      line-height: 1;
    }
    .btn-delete:hover { color: var(--red); }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }
    .empty-icon {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
      opacity: 0.5;
    }

    /* トースト */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--white);
      color: var(--black);
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 未ログイン画面 */
    .not-auth {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 20px;
      gap: 16px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="header">
  <a href="/">← 戻る</a>
  <h1>WORKOUT LOG</h1>
</div>

<div class="container" id="app">
  <div class="page-loading">
    <div class="spinner"></div>
    <span>読み込み中...</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://xlaboiimqsesglstdjqj.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_9fxRahudPNG9gHRJKkPD3Q_s8m-OUna';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const app = document.getElementById('app');

  // ============================================================
  // 認証確認
  // ============================================================
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    app.innerHTML = `
      <div class="not-auth">
        <span style="font-size:40px;">🔒</span>
        <p>ログインが必要です</p>
        <a href="/" style="color:var(--accent); text-decoration:none; font-weight:700; font-size:14px;">トップページに戻る →</a>
      </div>
    `;
    // 未ログインはトップにリダイレクト（少し待ってから）
    setTimeout(() => { window.location.href = '/'; }, 2000);
    throw new Error('not authenticated');
  }

  const userEmail = session.user.email;

  // 購入者確認
  const { data: allowed } = await supabase
    .from('allowed_users')
    .select('id, created_at')
    .eq('email', userEmail)
    .maybeSingle();

  if (!allowed) {
    app.innerHTML = `
      <div class="not-auth">
        <span style="font-size:40px;">🚫</span>
        <p>この機能は購入者限定です</p>
        <a href="/" style="color:var(--accent); text-decoration:none; font-weight:700; font-size:14px;">トップページに戻る →</a>
      </div>
    `;
    throw new Error('not allowed');
  }

  // ============================================================
  // データ管理
  // ============================================================
  let allLogs = [];

  // 購入日から3ヶ月の期限計算
  const purchaseDate = new Date(allowed.created_at);
  const expireDate = new Date(purchaseDate);
  expireDate.setMonth(expireDate.getMonth() + 3);
  const fromDate = purchaseDate.toISOString().split('T')[0];

  async function loadLogs() {
    const { data, error } = await supabase
      .from('workout_logs')
      .select('*')
      .eq('user_email', userEmail)
      .gte('date', fromDate)
      .order('date', { ascending: false })
      .order('created_at', { ascending: false });

    if (error) {
      console.error('記録取得エラー:', error);
      return;
    }
    allLogs = data || [];
  }

  async function addLog(exercise, sets, reps, weight, date) {
    const { data, error } = await supabase
      .from('workout_logs')
      .insert([{ user_email: userEmail, date, exercise, sets, reps, weight }])
      .select()
      .single();
    if (error) throw error;
    return data;
  }

  async function deleteLog(id) {
    const { error } = await supabase
      .from('workout_logs')
      .delete()
      .eq('id', id)
      .eq('user_email', userEmail);
    if (error) throw error;
  }

  // ============================================================
  // レンダリング
  // ============================================================
  function render() {
    const todayStr = new Date().toISOString().split('T')[0];
    const weekVol = calcWeeklyVolume();
    const lastWeekVol = calcLastWeekVolume();
    const vsHtml = buildVsHtml(weekVol, lastWeekVol);

    app.innerHTML = `
      <!-- 今週のボリューム -->
      <div class="volume-card">
        <div class="volume-label">📊 今週のボリューム</div>
        <div class="volume-row">
          <div>
            <span class="volume-number" id="weeklyVol">${weekVol.toLocaleString()}</span>
            <span class="volume-unit">kg</span>
          </div>
          <div class="volume-vs" id="weeklyVs">${vsHtml}</div>
        </div>
      </div>

      <!-- 記録フォーム -->
      <div class="form-card">
        <div class="form-title">＋ 記録を追加</div>
        <div class="form-grid">
          <div class="form-field full">
            <label>種目名</label>
            <input type="text" id="f-exercise" placeholder="例：ベンチプレス">
          </div>
          <div class="form-field">
            <label>セット数</label>
            <input type="number" id="f-sets" placeholder="3" min="1" max="20" inputmode="numeric">
          </div>
          <div class="form-field">
            <label>回数 / セット</label>
            <input type="number" id="f-reps" placeholder="10" min="1" max="100" inputmode="numeric">
          </div>
          <div class="form-field">
            <label>重量（kg）</label>
            <input type="number" id="f-weight" placeholder="60" min="0" max="500" step="0.5" inputmode="decimal">
          </div>
          <div class="form-field">
            <label>日付</label>
            <input type="date" id="f-date" value="${todayStr}">
          </div>
        </div>
        <button class="btn-add" id="btnAdd">記録する</button>
      </div>

      <!-- 過去の記録 -->
      <div class="logs-header">📋 過去の記録</div>
      <div id="logsList">${renderLogs()}</div>
    `;

    // イベント
    document.getElementById('btnAdd').addEventListener('click', handleAdd);
    document.getElementById('f-exercise').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleAdd();
    });
  }

  function renderLogs() {
    if (!allLogs.length) {
      return `<div class="empty-state">
        <span class="empty-icon">💪</span>
        まだ記録がありません<br>最初のトレーニングを記録しよう！
      </div>`;
    }

    const todayStr = new Date().toISOString().split('T')[0];

    // 日付でグループ化
    const grouped = {};
    allLogs.forEach(log => {
      if (!grouped[log.date]) grouped[log.date] = [];
      grouped[log.date].push(log);
    });

    return Object.keys(grouped)
      .sort((a, b) => b.localeCompare(a))
      .map(date => {
        const label = date === todayStr ? '今日' : formatDate(date);
        const items = grouped[date].map(log => {
          const vol = log.sets * log.reps * log.weight;
          return `<div class="log-item">
            <div class="log-info">
              <div class="log-exercise">${escHtml(log.exercise)}</div>
              <div class="log-detail">${log.sets}セット × ${log.reps}回 × ${log.weight}kg</div>
            </div>
            <div class="log-right">
              <div class="log-volume">
                <div class="log-vol-num">${vol.toLocaleString()}</div>
                <div class="log-vol-unit">kg vol</div>
              </div>
              <button class="btn-delete" data-id="${log.id}" title="削除">×</button>
            </div>
          </div>`;
        }).join('');
        return `<div class="date-group"><div class="date-label">${label}</div>${items}</div>`;
      }).join('');
  }

  function updateLogs() {
    const el = document.getElementById('logsList');
    if (el) el.innerHTML = renderLogs();

    const volEl = document.getElementById('weeklyVol');
    const vsEl = document.getElementById('weeklyVs');
    if (volEl) {
      const wv = calcWeeklyVolume();
      const lv = calcLastWeekVolume();
      volEl.textContent = wv.toLocaleString();
      if (vsEl) vsEl.innerHTML = buildVsHtml(wv, lv);
    }

    // 削除ボタン再アタッチ
    attachDeleteHandlers();
  }

  function attachDeleteHandlers() {
    document.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        try {
          await deleteLog(id);
          allLogs = allLogs.filter(l => l.id !== id);
          updateLogs();
          toast('🗑️ 削除しました');
        } catch (e) {
          toast('❌ 削除に失敗しました');
        }
      });
    });
  }

  // ============================================================
  // ボリューム計算
  // ============================================================
  function getWeekBounds(offsetWeeks = 0) {
    const now = new Date();
    const day = now.getDay();
    const start = new Date(now);
    start.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offsetWeeks * 7);
    start.setHours(0, 0, 0, 0);
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    end.setHours(23, 59, 59, 999);
    return { start, end };
  }

  function calcWeeklyVolume() {
    const { start, end } = getWeekBounds(0);
    return allLogs
      .filter(l => {
        const d = new Date(l.date);
        return d >= start && d <= end;
      })
      .reduce((sum, l) => sum + l.sets * l.reps * l.weight, 0);
  }

  function calcLastWeekVolume() {
    const { start, end } = getWeekBounds(-1);
    return allLogs
      .filter(l => {
        const d = new Date(l.date);
        return d >= start && d <= end;
      })
      .reduce((sum, l) => sum + l.sets * l.reps * l.weight, 0);
  }

  function buildVsHtml(thisWeek, lastWeek) {
    if (lastWeek === 0) return `<span style="color:var(--muted);font-size:12px;">先週のデータなし</span>`;
    const diff = thisWeek - lastWeek;
    const pct = Math.round((diff / lastWeek) * 100);
    if (diff > 0) return `先週比 <span class="vs-up">▲${pct}%</span><br>+${diff.toLocaleString()}kg`;
    if (diff < 0) return `先週比 <span class="vs-down">▼${Math.abs(pct)}%</span><br>${diff.toLocaleString()}kg`;
    return `先週と同じ`;
  }

  // ============================================================
  // フォーム送信
  // ============================================================
  async function handleAdd() {
    const exercise = document.getElementById('f-exercise')?.value.trim();
    const sets = parseInt(document.getElementById('f-sets')?.value);
    const reps = parseInt(document.getElementById('f-reps')?.value);
    const weight = parseFloat(document.getElementById('f-weight')?.value);
    const date = document.getElementById('f-date')?.value;

    if (!exercise) { toast('⚠️ 種目名を入力してください'); return; }
    if (!sets || sets < 1) { toast('⚠️ セット数を入力してください'); return; }
    if (!reps || reps < 1) { toast('⚠️ 回数を入力してください'); return; }
    if (isNaN(weight) || weight < 0) { toast('⚠️ 重量を入力してください'); return; }
    if (!date) { toast('⚠️ 日付を選択してください'); return; }

    const btn = document.getElementById('btnAdd');
    if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }

    try {
      const newLog = await addLog(exercise, sets, reps, weight, date);
      allLogs.unshift(newLog);
      updateLogs();
      // フォームリセット（日付は今日のまま）
      document.getElementById('f-exercise').value = '';
      document.getElementById('f-sets').value = '';
      document.getElementById('f-reps').value = '';
      document.getElementById('f-weight').value = '';
      document.getElementById('f-exercise').focus();
      toast('✅ 記録しました！');
    } catch (e) {
      console.error('追加エラー:', e);
      toast('❌ 保存に失敗しました');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '記録する'; }
    }
  }

  // ============================================================
  // ユーティリティ
  // ============================================================
  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
    return `${m}月${day}日（${weekdays[d.getDay()]}）`;
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ============================================================
  // 初期化
  // ============================================================
  await loadLogs();
  render();
  attachDeleteHandlers();
</script>

</body>
</html>
